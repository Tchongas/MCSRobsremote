<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c10;
        --surface: #13151a;
        --border: #2a2f38;
        --text: #f1f3f7;
        --muted: #a2a9b8;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at 0% 0%, #1b2536, var(--bg) 40%);
        color: var(--text);
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      body {
        padding: 14px;
        box-sizing: border-box;
      }
      .plugin-window-shell {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        padding: 14px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      code {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    {{CONTENT}}
  </body>
</html>
